name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/markprint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pdm install -G dev -G test

      - name: Run lint
        run: pdm run ruff check .

      - name: Run format check
        run: pdm run ruff format --check .

      - name: Run type check
        run: pdm run pyright

      - name: Run tests
        run: pdm run pytest --cov=markprint --cov-report=term-missing

      - name: Build package
        run: pdm run python -m build

      - name: Check package artifacts
        run: pdm run twine check dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
