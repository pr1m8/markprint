name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pdm-project/setup-pdm@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pdm install -G test -G dev
      - run: pdm run ruff check .
      - run: pdm run pytest --cov=markprint
